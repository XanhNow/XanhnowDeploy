name: Validate Auth App Sources

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Auth app to validate"
        required: true
        type: choice
        options:
          - jwt-refresh-token
          - auth-login
          - passkey-provider
          - smart-otp
          - all
      source_ref:
        description: "Source branch, tag, or commit SHA"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: validate-auth-apps
  cancel-in-progress: false

jobs:
  validate:
    runs-on: [self-hosted, linux, x64, api-deploy]

    steps:
      - name: Checkout deploy repository
        uses: actions/checkout@v4

      - name: Validate selected Auth app source
        shell: bash
        env:
          SELECTED_APP: ${{ inputs.app }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_READ_TOKEN: ${{ secrets.XN_SOURCE_READ_TOKEN }}
        run: |
          set -Eeuo pipefail
          test "$(hostname -s)" = "hungangu"
          chmod +x deploy/scripts/validate-auth-apps.sh
          deploy/scripts/validate-auth-apps.sh
